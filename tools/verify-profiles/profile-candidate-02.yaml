name: VerifySweepC02

description: Verifier sweep candidate 02. Vanilla unlock mode crossed with destination shuffle plus battle arenas and gem cups. Targets the crystal-arena key floor (verifier models hub floor, apworld keeps the vanilla plus-one-Key gate only in vanilla mode) and the vanilla trophy-floor re-key under destination shuffle (issue 80 territory). See the proposal note in this folder.

game: Crash Team Racing
requires:
  version: 0.6.7
  game:
    Crash Team Racing: 0.1.0

