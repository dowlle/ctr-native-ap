name: VerifySweepC03

description: Verifier sweep candidate 03. Bethany's structural combination (merged shuffle across crystals plus tracks plus cups, two-stage density full, all podium rungs, one-lap cups, an 18-entry exclude list gutting the platinum time-trial class) but with DEFAULT icebound_beta5 weights and a plain sapphire oxide-final goal instead of custom weights and any_relic_type. De-confounds whether the reported false positive comes from the structural shuffle plus density plus excludes or from the custom weights and goal mode. See the proposal note in this folder.

game: Crash Team Racing
requires:
  version: 0.6.7
  game:
    Crash Team Racing: 0.1.0

Crash Team Racing:
  progression_balancing: normal
  accessibility: full
  goal: oxidefinal
  oxide_final_challenge_unlock: sapphire_relics
  oxide_final_challenge_relic_count: 18
  shuffle_gems: 'true'
  include_gem_cups: 'true'
  shuffle_keys: 'true'
  trap_fill_percentage: 0
  include_battle_arenas: 'true'
  warp_pad_shuffle_categories:
    ['crystals', 'tracks', 'cups']
  warp_pad_shuffle_grouping: merged
  warppad_unlock_requirements: randomized
  two_stage_density: full
  requirement_variety: icebound_beta5
  podium_placement_checks: 'true'
  podium_finish_rungs: 'true'
  podium_any_position_rung: 'true'
  podium_held_rungs: 'true'
  podium_held_fifth_rung: 'true'
  one_lap_cups: 'true'
  death_link: 'off'
  deathlink_amnesty: 1
  sapphire_relic_progression: full
  gold_relic_progression: full
  platinum_relic_progression: full

  exclude_locations:
    ["Crash Cove: Platinum Time Trial", "Roo's Tubes: Platinum Time Trial", "Mystery Caves: Platinum Time Trial", "Sewer Speedway: Platinum Time Trial", "Dingo Canyon: Platinum Time Trial", "Tiger Temple: Platinum Time Trial", "Papu's Pyramid: Platinum Time Trial", "Coco Park: Platinum Time Trial", "Blizzard Bluff: Platinum Time Trial", "Dragon Mines: Platinum Time Trial", "Polar Pass: Platinum Time Trial", "Tiny Arena: Platinum Time Trial", "Hot Air Skyway: Platinum Time Trial", "Cortex Castle: Platinum Time Trial", "N. Gin Labs: Platinum Time Trial", "Oxide Station: Platinum Time Trial", "Slide Coliseum: Platinum Time Trial", "Turbo Track: Platinum Time Trial"]
