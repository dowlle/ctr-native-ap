name: VerifySweepC08

description: Verifier sweep candidate 08. A partial start_inventory (2 Keys, 8 Trophies, 2 Purple CTR Tokens) crossed with two-stage density full and merged destination shuffle. The verifier seeds its fixed-point sweep from the live received tallies, which on a fresh solo connect already include the start_inventory, so a large pre-grant opens many pads at connect and moves the sweep away from an empty starting state. Tests that the verifier initial counts and the generator agree once part of the progression spine is pre-placed. See the proposal note in this folder.

game: Crash Team Racing
requires:
  version: 0.6.7
  game:
    Crash Team Racing: 0.1.0

Crash Team Racing:
  progression_balancing: normal
  accessibility: full
  goal: oxidefinal
  oxide_final_challenge_unlock: sapphire_relics
  oxide_final_challenge_relic_count: 18
  shuffle_gems: 'true'
  include_gem_cups: 'true'
  shuffle_keys: 'true'
  trap_fill_percentage: 0
  include_battle_arenas: 'true'
  warp_pad_shuffle_categories:
    ['crystals', 'tracks', 'cups']
  warp_pad_shuffle_grouping: merged
  warppad_unlock_requirements: randomized
  two_stage_density: full
  requirement_variety: icebound_beta5
  podium_placement_checks: 'true'
  podium_finish_rungs: 'true'
  podium_any_position_rung: 'true'
  podium_held_rungs: 'true'
  podium_held_fifth_rung: 'false'
  one_lap_cups: 'false'
  death_link: 'off'
  deathlink_amnesty: 1
  sapphire_relic_progression: full
  gold_relic_progression: full
  platinum_relic_progression: full

  start_inventory:
    {Key: 2, Trophy: 8, Purple CTR Token: 2}
